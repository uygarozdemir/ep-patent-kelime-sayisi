<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<title>EP B1 Kelime Sayısı</title>
<style>
  body {
    font-family: Segoe UI, Arial, sans-serif;
    width: 280px;
    padding: 12px;
    margin: 0;
  }
  h1 {
    font-size: 14px;
    margin: 0 0 10px;
  }
  #number {
    width: 100%;
    box-sizing: border-box;
    padding: 6px 8px;
    font-size: 13px;
  }
  #search {
    width: 100%;
    margin-top: 8px;
    padding: 7px;
    font-size: 13px;
    cursor: pointer;
  }
  #status {
    margin-top: 10px;
    font-size: 12px;
    color: #555;
    min-height: 16px;
  }
  #result {
    margin-top: 10px;
    font-size: 13px;
    display: none;
  }
  #result .total {
    font-size: 20px;
    font-weight: bold;
  }
  #result table {
    margin-top: 6px;
    font-size: 12px;
    color: #555;
    border-collapse: collapse;
  }
  #result td {
    padding: 1px 6px 1px 0;
  }
  .error {
    color: #b00020;
  }
</style>
</head>
<body>
  <h1>EP Patent B1 Kelime Sayısı</h1>
  <input id="number" type="text" placeholder="EP 3634453">
  <button id="search">Ara</button>
  <div id="status"></div>
  <div id="result">
    <div class="total"></div>
    <table>
      <tr><td>Tarifname:</td><td class="desc-count"></td></tr>
      <tr><td>İstemler:</td><td class="claims-count"></td></tr>
    </table>
  </div>
  <script src="popup.js"></script>
</body>
</html>
